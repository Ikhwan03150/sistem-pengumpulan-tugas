<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pengumpulan Tugas Data Mining</title>
    <style>
        .tugas-container {
            max-width: 500px;
            margin: 30px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        .tugas-container h2 {
            text-align: center;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        .tugas-container p.subtitle {
            text-align: center;
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 0;
            margin-bottom: 15px;
        }
        
        .btn-rekap-container {
            text-align: center;
            margin-bottom: 25px;
        }
        .btn-rekap {
            display: inline-block;
            background-color: #f1f2f6;
            color: #2f3542;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #dfe4ea;
            transition: background-color 0.2s, box-shadow 0.2s;
        }
        .btn-rekap:hover {
            background-color: #eccc68;
            color: #2f3542;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input[type="text"],
        .form-group input[type="url"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 5px rgba(52,152,219,0.3);
        }
        .form-group input[readonly] {
            background-color: #f5f5f5;
            color: #7f8c8d;
            cursor: not-allowed;
            font-weight: bold;
        }
        .nim-input-group {
            display: flex;
            gap: 10px;
        }
        .btn-cek {
            background: #3498db;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-cek:hover { background: #2980b9; }
        
        .btn-submit {
            width: 100%;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover { background: #27ae60; }
        .btn-submit:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 12px;
            border-radius: 5px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
            line-height: 1.4;
        }
        .alert-danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        
        .loading-spy {
            display: inline-block;
            width: 15px;
            height: 15px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 5px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="tugas-container">
    <h2>Pengumpulan Tugas</h2>
    <p class="subtitle">Mata Kuliah: Data Mining</p>
    
    <div class="btn-rekap-container">
        <a href="https://www.sketzhbook.com/p/rekap-tugas-data-mining.html" target="_blank" class="btn-rekap">
            📄 Lihat Rekap Tugas yang Terkumpul
        </a>
    </div>
    
    <div id="alertBox" class="alert"></div>
    
    <form id="formTugas" onsubmit="kirimTugas(event)">
        <div class="form-group">
            <label>NIM Mahasiswa</label>
            <div class="nim-input-group">
                <input type="text" id="nim" placeholder="Masukkan NIM Anda" required>
                <button type="button" class="btn-cek" id="btnCek" onclick="verifikasiNIM()">Cek NIM</button>
            </div>
        </div>
        
        <div id="sectionDataMahasiswa" style="display:none;">
            <div class="form-group">
                <label>Tugas Pertemuan</label>
                <input type="text" id="tugasPertemuan" readonly>
            </div>
            <div class="form-group">
                <label>Nama Mahasiswa</label>
                <input type="text" id="nama" readonly>
            </div>
            <div class="form-group">
                <label>Sistem Perkuliahan / Hari Kelas</label>
                <input type="text" id="infoKelas" readonly>
            </div>
            <div class="form-group">
                <label>Kode Kelas & Ruangan</label>
                <input type="text" id="kodeRuangan" readonly>
            </div>
            <div class="form-group">
                <label>Link Tugas (Google Drive / GitHub / Cloud)</label>
                <input type="url" id="linkTugas" placeholder="https://drive.google.com/..." required>
            </div>
            <button type="submit" class="btn-submit" id="btnSubmit">Submit Tugas</button>
        </div>
    </form>
</div>

<script>
    // PASTIKAN ANDA MENGISI KEMBALI URL WEB APP DI BAWAH INI
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwRgDNCOTmbkoMK0yqfBThNuSJ7sbBDxSnPkinjuV8f2p8KB5HdV4MKjl5agGLe2vT7HA/exec";

    // Halaman dimuat hanya menampilkan instruksi awal
    window.onload = function() {
        showAlert("info", "Silakan masukkan NIM Anda untuk memvalidasi status pengumpulan tugas.");
    };

    function showAlert(type, message) {
        const alertBox = document.getElementById("alertBox");
        alertBox.className = `alert alert-${type}`;
        alertBox.innerHTML = message;
        alertBox.style.display = "block";
    }

    function hideAlert() {
        document.getElementById("alertBox").style.display = "none";
    }

    function verifikasiNIM() {
        const nimValue = document.getElementById("nim").value.trim();
        const btnCek = document.getElementById("btnCek");
        const sectionMhs = document.getElementById("sectionDataMahasiswa");
        
        if(!nimValue) {
            showAlert("danger", "Peringatan: NIM tidak boleh kosong!");
            return;
        }
        
        btnCek.innerHTML = '<div class="loading-spy"></div> Memeriksa...';
        btnCek.disabled = true;
        sectionMhs.style.display = "none";
        hideAlert();
        
        fetch(`${WEB_APP_URL}?action=checkNIM&nim=${nimValue}`)
            .then(res => res.json())
            .then(res => {
                btnCek.innerHTML = 'Cek NIM';
                btnCek.disabled = false;
                
                if(res.status === "allowed") {
                    showAlert("success", `NIM Terverifikasi! Halo <strong>${res.mahasiswa.nama}</strong>, form pengumpulan tugas masih terbuka. Silakan lampirkan link tugas Anda.`);
                    
                    // Isi form field secara otomatis termasuk Tugas Pertemuan
                    document.getElementById("tugasPertemuan").value = "Pertemuan " + res.tugas;
                    document.getElementById("nama").value = res.mahasiswa.nama;
                    document.getElementById("infoKelas").value = `${res.mahasiswa.reguler} (Hari ${res.mahasiswa.hari})`;
                    document.getElementById("kodeRuangan").value = res.mahasiswa.kelas;
                    
                    // Tampilkan kotak yang sebelumnya disembunyikan
                    sectionMhs.style.display = "block";
                    document.getElementById("btnSubmit").disabled = false;
                    document.getElementById("linkTugas").value = "";
                } else {
                    showAlert("danger", res.message);
                    sectionMhs.style.display = "none";
                }
            })
            .catch(err => {
                btnCek.innerHTML = 'Cek NIM';
                btnCek.disabled = false;
                showAlert("danger", "Terjadi kegagalan koneksi ke server database.");
                console.error(err);
            });
    }

    function kirimTugas(e) {
        e.preventDefault();
        const btnSubmit = document.getElementById("btnSubmit");
        const nim = document.getElementById("nim").value.trim();
        const linkTugas = document.getElementById("linkTugas").value.trim();
        
        btnSubmit.innerHTML = '<div class="loading-spy"></div> Mengirim...';
        btnSubmit.disabled = true;
        
        const payload = { nim: nim, linkTugas: linkTugas };
        
        fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(res => {
            if(res.status === "success") {
                showAlert("success", `<strong>Selesai!</strong> ${res.message}`);
                document.getElementById("formTugas").reset();
                document.getElementById("sectionDataMahasiswa").style.display = "none";
                btnSubmit.innerHTML = 'Submit Tugas';
                
                setTimeout(() => {
                    window.location.reload();
                }, 4000); 

            } else {
                showAlert("danger", res.message);
                btnSubmit.innerHTML = 'Submit Tugas';
                btnSubmit.disabled = false;
            }
        })
        .catch(err => {
            showAlert("danger", "Gagal mengirim tugas. Silakan coba beberapa saat lagi.");
            btnSubmit.innerHTML = 'Submit Tugas';
            btnSubmit.disabled = false;
            console.error(err);
        });
    }
</script>

</body>
</html>
